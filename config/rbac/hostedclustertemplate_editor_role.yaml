# This rule is not used by the project gcp-hcp-backend itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the hcp.gcp.hypershift.openshift.com.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: gcp-hcp-backend
    app.kubernetes.io/managed-by: kustomize
  name: hostedclustertemplate-editor-role
rules:
- apiGroups:
  - hcp.gcp.hypershift.openshift.com
  resources:
  - hostedclustertemplates
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - hcp.gcp.hypershift.openshift.com
  resources:
  - hostedclustertemplates/status
  verbs:
  - get

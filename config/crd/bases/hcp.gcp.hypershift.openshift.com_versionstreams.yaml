---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: versionstreams.hcp.gcp.hypershift.openshift.com
spec:
  group: hcp.gcp.hypershift.openshift.com
  names:
    kind: VersionStream
    listKind: VersionStreamList
    plural: versionstreams
    singular: versionstream
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.targetVersion
      name: Target
      type: string
    - jsonPath: .status.resolvedVersion
      name: Resolved
      type: string
    - jsonPath: .status.conditions[?(@.type=='ImageResolved')].status
      name: Image Resolved
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          VersionStream tracks the target OCP version for a group of clusters.
          When the target version changes, all associated ManagedHostedClusters
          are upgraded (subject to their UpgradeSchedule constraints).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of VersionStream
            properties:
              arch:
                default: amd64
                description: |-
                  arch is the CPU architecture for the release image.
                  Defaults to "amd64" if not set.
                type: string
              channelGroup:
                default: stable
                description: |-
                  channelGroup is the Cincinnati channel group used to resolve
                  the target version (e.g. "stable", "fast", "candidate").
                  Defaults to "stable" if not set.
                type: string
              targetVersion:
                description: |-
                  targetVersion is the desired OCP version as major.minor (e.g. "4.16").
                  The controller resolves this to the latest patch version available in
                  the Cincinnati update graph for the configured channel.
                  Changing this triggers upgrades for all clusters referencing this stream,
                  subject to their individual UpgradeSchedule constraints.
                type: string
            required:
            - targetVersion
            type: object
          status:
            description: status defines the observed state of VersionStream
            properties:
              channel:
                description: |-
                  channel is the Cincinnati channel used for version resolution
                  (e.g. "stable-4.16").
                type: string
              conditions:
                description: conditions represent the current state of the VersionStream
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              releaseImage:
                description: |-
                  releaseImage is the fully-qualified pullspec resolved from Cincinnati
                  for the target version (e.g. "quay.io/openshift-release-dev/ocp-release:4.16.3-x86_64").
                  Empty until the image is successfully resolved.
                type: string
              resolvedVersion:
                description: |-
                  resolvedVersion is the exact OCP version that was resolved
                  (e.g. "4.16.3"), representing the latest patch for the target major.minor.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
